name: orcha-website
region: nyc
static_sites:
  - name: website
    github:
      repo: whileTrueYield/orcha-docs
      branch: main
      deploy_on_push: true
    build_command: npm install && npm run build
    output_dir: dist
    environment_slug: node-js
    routes:
      - path: /
    catchall_document: 404.html
domains:
  - domain: orcha.run
    type: PRIMARY
  - domain: www.orcha.run
    type: ALIAS
